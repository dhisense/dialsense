name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same branch/PR to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege default; jobs opt into more if they ever need it.
permissions:
  contents: read

jobs:
  build:
    name: Typecheck, test, build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      # `npm test` runs typecheck then the unit tests (see package.json).
      - name: Typecheck and test
        run: npm test

      - name: Build
        run: npm run build

  security:
    name: Dependency vulnerability scan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Blocks on high/critical only - low/moderate issues (e.g. a
      # dev-only, Windows-only esbuild advisory with no non-breaking fix
      # available at time of writing) are visible in the log but don't
      # fail the build. This package ships zero runtime dependencies, so
      # this only ever covers build tooling, not what consumers install.
      - name: Audit dependencies
        run: npm audit --audit-level=high
