name: Release

on:
  push:
    tags:
      - 'v*.*.*'

# contents:write to create the GitHub Release; id-token:write for npm
# provenance (supply-chain attestation that this build actually came from
# this repo/workflow, not a hand-published tarball).
permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: Verify and publish to npm
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Same security gate as ci.yml - a tag could in principle be pushed
      # without that workflow having run against this exact commit, so
      # this re-verifies rather than assuming it.
      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Typecheck and test
        run: npm test

      - name: Build
        run: npm run build

      # Fails loudly rather than publishing a version that doesn't match
      # the tag that triggered this - keeps the git tag and the published
      # npm version from ever being able to drift apart.
      - name: Verify tag matches package.json version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag v$TAG_VERSION does not match package.json version $PKG_VERSION"
            exit 1
          fi

      # Fail fast with a clear message rather than letting npm produce a
      # cryptic ENEEDAUTH error.  The secret must be set to a valid npm
      # automation token (Settings → Secrets → Actions → NPM_TOKEN).
      - name: Verify NPM_TOKEN secret is configured
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "::error::NPM_TOKEN secret is not set. Add a valid npm automation token via Settings → Secrets → Actions → New repository secret (name: NPM_TOKEN)."
            exit 1
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # `--access public` is a no-op for an unscoped package name like
      # "dialsense" (unscoped packages default to public) but is kept
      # explicit for clarity and in case this ever moves under a scope.
      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
